steps:
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'our-sanctuary-service'
      - '--source'
      - '.'
      - '--region'
      - 'australia-southeast1'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'GEMINI_API_KEY=${_GEMINI_KEY}'
      - '--add-volume'
      - 'name=db-volume,type=cloud-storage,bucket=the-parent-500004-sanctuary-data'
      - '--add-volume-mount'
      - 'volume=db-volume,mount-path=/app/data'
      - '--project'
      - 'the-parent-500004'
      - '--quiet'
options:
  logging: CLOUD_LOGGING_ONLY
substitutions:
  _GEMINI_KEY: ''

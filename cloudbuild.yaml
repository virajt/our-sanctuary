steps:
  # Build the Docker image explicitly with --build-arg, rather than relying
  # on `gcloud run deploy --source .`'s --update-build-env-vars flag. That
  # flag is documented for buildpacks-based source builds; when a literal
  # Dockerfile is present (as here), Cloud Run builds straight from it and
  # that flag does not reliably translate into a Docker build arg. Building
  # explicitly with `docker build --build-arg` guarantees GOOGLE_CLIENT_ID
  # actually reaches the `ARG GOOGLE_CLIENT_ID` line in the Dockerfile.
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'GOOGLE_CLIENT_ID=${_GOOGLE_CLIENT_ID}'
      - '-t'
      - 'australia-southeast1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/our-sanctuary/our-sanctuary-service:${SHORT_SHA}'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'australia-southeast1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/our-sanctuary/our-sanctuary-service:${SHORT_SHA}'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'our-sanctuary-service'
      - '--image'
      - 'australia-southeast1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/our-sanctuary/our-sanctuary-service:${SHORT_SHA}'
      - '--region'
      - 'australia-southeast1'
      - '--allow-unauthenticated'
      - '--update-env-vars'
      - 'GEMINI_API_KEY=${_GEMINI_KEY},FIRESTORE_DATABASE_ID=our-sanctuary,MEDIA_BUCKET_NAME=the-parent-500004-sanctuary-media'
      # Runtime auth vars (GOOGLE_CLIENT_ID, ALLOWED_EMAILS, SESSION_SECRET)
      # are managed directly on the Cloud Run service via the console
      # ("Edit & Deploy New Revision" -> Variables & Secrets). We deliberately
      # use --update-env-vars (not --set-env-vars) above so this step only
      # ever touches GEMINI_API_KEY and never wipes those other variables -
      # --set-env-vars is destructive and deletes any existing runtime
      # variable not explicitly listed in it, which would otherwise silently
      # break sign-in on every deploy.
      - '--add-volume'
      - 'name=db-volume,type=cloud-storage,bucket=the-parent-500004-sanctuary-data'
      - '--add-volume-mount'
      - 'volume=db-volume,mount-path=/app/data'
      - '--project'
      - 'the-parent-500004'
      - '--quiet'

  # Build-completion email. Cloud Build's automatic "approval required"
  # email is built into the platform itself - this step is the closest
  # equivalent for "the build finished" using a lightweight transactional
  # email API (no extra Cloud Run service or Pub/Sub plumbing needed).
  # Only runs if every prior step succeeded - Cloud Build skips remaining
  # steps after a failure, so a missing email also tells you something
  # broke earlier in the build.
  - name: 'gcr.io/cloud-builders/curl'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        # _NOTIFY_EMAIL can be one address or several comma-separated
        # addresses (e.g. "a@x.com,b@y.com") - build a proper JSON array
        # from it rather than dropping the raw string into one array slot,
        # which would send to a single literal (and invalid) address
        # containing a comma.
        TO_JSON=$(echo "${_NOTIFY_EMAIL}" | tr ',' '\n' | sed '/^$/d' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | sed 's/.*/"&"/' | paste -sd ',' -)
        curl -s -X POST 'https://api.resend.com/emails' \
          -H "Authorization: Bearer ${_RESEND_API_KEY}" \
          -H 'Content-Type: application/json' \
          -d "{\"from\":\"Our Sanctuary Build <onboarding@resend.dev>\",\"to\":[$TO_JSON],\"subject\":\"Build succeeded - our-sanctuary-service\",\"text\":\"Commit ${SHORT_SHA} built and deployed successfully.\"}"

images:
  - 'australia-southeast1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/our-sanctuary/our-sanctuary-service:${SHORT_SHA}'
options:
  logging: CLOUD_LOGGING_ONLY
substitutions:
  _GEMINI_KEY: ''
  _GOOGLE_CLIENT_ID: ''
  _RESEND_API_KEY: ''
  _NOTIFY_EMAIL: ''

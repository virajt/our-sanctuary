steps:
  - name: 'bash'
    env:
      - 'CLIENT_ID_CHECK=${_GOOGLE_CLIENT_ID}'
    args:
      - '-c'
      - |
        echo "=== DEBUG: substitution variable check ==="
        echo "Direct YAML substitution as literal text: [${_GOOGLE_CLIENT_ID}]"
        echo "Via env: passthrough, length: ${#CLIENT_ID_CHECK}"
        if [ -z "$CLIENT_ID_CHECK" ]; then
          echo "WARNING: empty via env passthrough too"
        else
          echo "Via env passthrough (first 10 chars): ${CLIENT_ID_CHECK:0:10}..."
        fi
        echo "=== END DEBUG ==="
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'our-sanctuary-service'
      - '--source'
      - '.'
      - '--region'
      - 'australia-southeast1'
      - '--allow-unauthenticated'
      - '--update-env-vars'
      - 'GEMINI_API_KEY=${_GEMINI_KEY}'
      # Runtime auth vars (GOOGLE_CLIENT_ID, ALLOWED_EMAILS, SESSION_SECRET)
      # are managed directly on the Cloud Run service via the console
      # ("Edit & Deploy New Revision" -> Variables & Secrets). We deliberately
      # use --update-env-vars (not --set-env-vars) above so this file only
      # ever touches GEMINI_API_KEY and never wipes those other variables -
      # --set-env-vars is destructive and deletes any existing runtime
      # variable not explicitly listed in it, which would otherwise silently
      # break sign-in on every build. GOOGLE_CLIENT_ID below is passed
      # separately as a *build-time* value only, since Vite needs it during
      # `npm run build` to embed it in the frontend bundle (see
      # SETUP_GOOGLE_AUTH.md, step 3) - it is unrelated to the runtime copy.
      - '--update-build-env-vars'
      - 'GOOGLE_CLIENT_ID=${_GOOGLE_CLIENT_ID}'
      - '--add-volume'
      - 'name=db-volume,type=cloud-storage,bucket=the-parent-500004-sanctuary-data'
      - '--add-volume-mount'
      - 'volume=db-volume,mount-path=/app/data'
      - '--project'
      - 'the-parent-500004'
      - '--quiet'
options:
  logging: CLOUD_LOGGING_ONLY
substitutions:
  _GEMINI_KEY: ''
  _GOOGLE_CLIENT_ID: ''
